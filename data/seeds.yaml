# 全国 自治体マスタ + シードURL
# スコープ: 国・省庁13 + 47都道府県 + 政令指定都市20 + 東京23特別区 = 103エントリ
#
# このファイルが自治体マスタの単一情報源 (single source of truth):
#   - db/load_bodies.py        → operating_bodies テーブルへ投入
#   - src/run.py               → クロールのシードURL
#   - next-app/lib/bodies.ts   → scripts/gen_bodies.py で再生成
#
# 各エントリ:
#   code        : 一意キー (英小文字。政令市は -shi で都道府県名と区別)
#   name        : 正式名称 (略さない)
#   type        : prefecture | designated_city | ward | city | town | village
#   prefecture  : 所属都道府県の code (都道府県自身は自分の code)
#   url         : クロール起点URL (ホームページ)
#
# 注意: url は自治体サイト改修で変わります。運用前に必ず疎通確認すること
#       (scripts/check_seeds.py で一括検証可能)。

sources:
